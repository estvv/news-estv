services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: news-backend-estv
    expose:
      - "8080"
    networks:
      - caddy_net
    volumes:
      - ./config.json:/app/config.json:ro
    environment:
      - PORT=8080
      - NODE_ENV=production
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        - VITE_API_URL=/api
    container_name: news-frontend-estv
    expose:
      - "80"
    networks:
      - caddy_net
    depends_on:
      - backend
    restart: unless-stopped

networks:
  caddy_net:
    external: true